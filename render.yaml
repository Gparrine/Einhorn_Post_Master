# Render Blueprint — Einhorn Postmaster API
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo
services:
  - type: web
    name: einhorn-postmaster-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://gparrine.github.io
